  <script type="text/javascript">

    function init()
    {
      const map = new BMapGL.Map("container");          // 创建地图实例
      const point = new BMapGL.Point(114.028352, 22.753845);  // 创建点坐标
      map.centerAndZoom(point, 25);                 // 初始化地图，设置中心点坐标和地图级别
      const marker = new BMapGL.Marker(point);        // 创建标注    
      map.addOverlay(marker);
      map.enableScrollWheelZoom();
      map.enableDragging();//启用地图拖拽事件，默认启用(可不写)
      map.enableDoubleClickZoom();//启用鼠标双击放大，默认启用(可不写)
      map.enableKeyboard();//启用键盘上下左右键移动地图

      const opts = {
        width: 250,     // 信息窗口宽度    
        height: 120,     // 信息窗口高度    
        title: "风别鹤技术交流"  // 信息窗口标题
      }
      const infoWindow = new BMapGL.InfoWindow("<br>联络地址：广东省东莞市塘厦镇塘厦大道南100号<br><br>公交站：大富工业区", opts);  // 创建信息窗口对象
      map.openInfoWindow(infoWindow, map.getCenter());      // 打开信息窗口
    }

    $(document).ready(function ()
    {
      setTimeout(init, 1000);
    });

  </script>
